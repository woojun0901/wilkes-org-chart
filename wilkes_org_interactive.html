<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wilkes Org Chart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .org-chart {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .node {
            background-color: #ffffff;
            border: 1px solid #cccccc;
            border-radius: 5px;
            padding: 10px;
            margin: 5px;
            width: 200px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Wilkes Organization Chart</h1>
    <div class="org-chart">
        <div class="node">CEO</div>
        <div class="node">CTO</div>
        <div class="node">CFO</div>
        <div class="node">COO</div>
    </div>
</body>
</html>
